<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preuzmi Kontakt</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: white;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 60px 40px;
            max-width: 500px;
        }
        .logo {
            max-width: 250px;
            height: auto;
            margin-bottom: 40px;
        }
        h1 {
            color: #033837;
            margin-bottom: 10px;
            font-size: 24px;
        }
        p {
            color: #666;
            margin: 0 0 8px 0;
            font-size: 16px;
        }
        button {
            margin-top: 30px;
            padding: 15px 40px;
            width: 100%;
            max-width: 320px;
            font-size: 16px;
            background: #033837;
            color: #96d7e2;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(3, 56, 55, 0.3);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(3, 56, 55, 0.4);
            background: #022625;
            transition: all 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="vpiplogo.png" alt="vpip" class="logo">
        <h1>Mihajlo Zatezalo</h1>
        <p>Managing Partner | Attorney at Law</p>
        <p>Trademark &amp; Patent Agent</p>
        <button onclick="downloadVCard()">Download VCard</button>
    </div>
    <script>
        function downloadVCard() {
            window.location.href = 'contact.vcf';
        }
    </script>
</body>
</html>
