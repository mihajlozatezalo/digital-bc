<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preuzmi Kontakt</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: white;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 60px 40px;
            max-width: 500px;
        }
        .logo {
            max-width: 250px;
            height: auto;
            margin-bottom: 40px;
        }
        h1 {
            color: #057151;
            margin-bottom: 15px;
            font-size: 24px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        button {
            padding: 15px 40px;
            font-size: 18px;
            background: #057151;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(5, 113, 81, 0.3);
            line-height: 1.3;
        }
        button .name {
            display: block;
            font-size: 18px;
            font-weight: bold;
        }
        button .title {
            display: block;
            font-size: 13px;
            font-weight: normal;
            opacity: 0.85;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(5, 113, 81, 0.4);
            background: #045a41;
            transition: all 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="vpiplogo.png" alt="vpip" class="logo">

        <h1>Mihajlo Zatezalo</h1>
        <p>Managing Partner | Attorney at Law</p>
        <button onclick="downloadVCard()">
            <span class="name">Preuzmi Kontakt</span>
            <span class="title">Download VCard</span>
        </button>
    </div>
    <script>
        function downloadVCard() {
            const a = document.createElement('a');
            a.href = 'https://raw.githubusercontent.com/mihajlozatezalo/digital-bc/refs/heads/main/contact.vfc';
            a.download = 'contact.vcf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
